<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — ZenStack MCP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        padding: 20px;
        -webkit-font-smoothing: antialiased;
      }

      .login-wrapper {
        width: 100%;
        max-width: 420px;
        animation: fadeInUp 0.6s ease-out;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .login-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 40px 36px;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .brand {
        text-align: center;
        margin-bottom: 32px;
      }

      .brand-icon {
        width: 52px;
        height: 52px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
      }

      .brand-icon svg {
        width: 26px;
        height: 26px;
        fill: none;
        stroke: white;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .brand h1 {
        font-size: 22px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -0.02em;
      }

      .brand p {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.5);
        margin-top: 6px;
      }

      .app-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(102, 126, 234, 0.12);
        border: 1px solid rgba(102, 126, 234, 0.25);
        border-radius: 8px;
        padding: 8px 14px;
        margin-bottom: 28px;
        width: 100%;
        justify-content: center;
      }

      .app-badge svg {
        width: 14px;
        height: 14px;
        fill: none;
        stroke: #667eea;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
      }

      .app-badge span {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.7);
      }

      .app-badge strong {
        color: #667eea;
        font-weight: 600;
      }

      .alert {
        padding: 12px 14px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 20px;
        display: none;
        animation: shake 0.4s ease-out;
      }

      .alert-error {
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.25);
        color: #fca5a5;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-6px); }
        40% { transform: translateX(6px); }
        60% { transform: translateX(-4px); }
        80% { transform: translateX(4px); }
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 7px;
        letter-spacing: 0.01em;
      }

      .input-wrapper {
        position: relative;
      }

      .input-wrapper svg {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        fill: none;
        stroke: rgba(255, 255, 255, 0.3);
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        pointer-events: none;
        transition: stroke 0.2s ease;
      }

      .input-wrapper input {
        width: 100%;
        padding: 13px 14px 13px 44px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        font-size: 15px;
        font-family: inherit;
        color: #ffffff;
        outline: none;
        transition: all 0.25s ease;
      }

      .input-wrapper input::placeholder {
        color: rgba(255, 255, 255, 0.25);
      }

      .input-wrapper input:focus {
        border-color: #667eea;
        background: rgba(102, 126, 234, 0.06);
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
      }

      .input-wrapper input:focus + svg,
      .input-wrapper:has(input:focus) svg {
        stroke: #667eea;
      }

      .submit-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #ffffff;
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.25s ease;
        position: relative;
        overflow: hidden;
        letter-spacing: 0.01em;
        margin-top: 4px;
      }

      .submit-btn::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.15) 0%,
          transparent 100%
        );
        opacity: 0;
        transition: opacity 0.25s ease;
      }

      .submit-btn:hover:not(:disabled)::before {
        opacity: 1;
      }

      .submit-btn:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      }

      .submit-btn:active:not(:disabled) {
        transform: translateY(0);
      }

      .submit-btn:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .submit-btn .spinner {
        display: none;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .submit-btn.loading .btn-text {
        display: none;
      }

      .submit-btn.loading .spinner {
        display: block;
      }

      .demo-hint {
        margin-top: 24px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        text-align: center;
      }

      .demo-hint p {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.35);
        line-height: 1.5;
      }

      .demo-hint code {
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 12px;
        background: rgba(102, 126, 234, 0.12);
        color: rgba(255, 255, 255, 0.6);
        padding: 2px 6px;
        border-radius: 4px;
      }

      .footer {
        text-align: center;
        margin-top: 20px;
      }

      .footer p {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.2);
      }

      /* Responsive */
      @media (max-width: 480px) {
        .login-card {
          padding: 32px 24px;
          border-radius: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24">
              <path d="M12 2L2 7l10 5 10-5-10-5z" />
              <path d="M2 17l10 5 10-5" />
              <path d="M2 12l10 5 10-5" />
            </svg>
          </div>
          <h1>Sign in to MCP Server</h1>
          <p>Authenticate to continue</p>
        </div>

        <div class="app-badge">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <span>Connecting to <strong id="client-name">MCP Application</strong></span>
        </div>

        <div id="error-container" class="alert alert-error"></div>

        <form id="login-form" autocomplete="on">
          <div class="form-group">
            <label for="email">Email address</label>
            <div class="input-wrapper">
              <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="you@example.com"
                autocomplete="email"
              />
              <svg viewBox="0 0 24 24">
                <rect x="2" y="4" width="20" height="16" rx="2" />
                <path d="M22 4l-10 8L2 4" />
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                required
                placeholder="Enter your password"
                autocomplete="current-password"
              />
              <svg viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </div>
          </div>

          <button type="submit" id="login-button" class="submit-btn">
            <span class="btn-text">Sign in</span>
            <div class="spinner"></div>
          </button>
        </form>

        <div class="demo-hint">
          <p>
            Demo: <code>alice@zenstack.dev</code> &nbsp;/&nbsp;
            <code>password123</code>
          </p>
        </div>
      </div>

      <div class="footer">
        <p>Secured by ZenStack MCP</p>
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);

      // Set client name
      const clientName = urlParams.get("client_name") || "MCP Application";
      document.getElementById("client-name").textContent = clientName;

      // Validate required parameters
      const requiredParams = ["client_id", "code_challenge", "redirect_uri"];
      const missingParams = requiredParams.filter((p) => !urlParams.get(p));

      if (missingParams.length > 0) {
        const card = document.querySelector(".login-card");
        card.innerHTML = `
          <div class="brand">
            <div class="brand-icon">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" />
                <line x1="15" y1="9" x2="9" y2="15" />
                <line x1="9" y1="9" x2="15" y2="15" />
              </svg>
            </div>
            <h1>Authorization Error</h1>
            <p>Missing required parameters: ${missingParams.join(", ")}</p>
          </div>
          <p style="color:rgba(255,255,255,0.4);text-align:center;font-size:14px;margin-top:16px;">
            Please check the authorization URL and try again.
          </p>
        `;
      } else {
        document
          .getElementById("login-form")
          .addEventListener("submit", async function (e) {
            e.preventDefault();

            const errorContainer = document.getElementById("error-container");
            const loginButton = document.getElementById("login-button");

            errorContainer.style.display = "none";
            loginButton.disabled = true;
            loginButton.classList.add("loading");

            try {
              const requestData = {
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
              };

              // Add all URL parameters to the request body
              for (const [key, value] of urlParams.entries()) {
                requestData[key] = value;
              }

              const response = await fetch("/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(requestData),
              });

              const result = await response.json();

              if (result.success && result.redirectUrl) {
                window.location.href = result.redirectUrl;
              } else {
                errorContainer.textContent =
                  result.error || "Invalid email or password";
                errorContainer.style.display = "block";
                loginButton.disabled = false;
                loginButton.classList.remove("loading");
              }
            } catch (error) {
              console.error("Login error:", error);
              errorContainer.textContent = "An unexpected error occurred. Please try again.";
              errorContainer.style.display = "block";
              loginButton.disabled = false;
              loginButton.classList.remove("loading");
            }
          });
      }
    </script>
  </body>
</html>
